<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cine Fer</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- Splash screen -->
  <div id="splash">
    <p>Bem-vinda ao<br /><span>Cine Fer</span></p>
  </div>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <h1 class="logo">Cine Fer</h1>
      <div class="curtain-deco">
        <span class="curtain curtain-left"></span>
        <span class="curtain curtain-right"></span>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main>
    <div class="poster-wall">
      <img class="poster-wall-img" src="assets/Cartaz-michael.png" alt="Cartazes do Cine Fer" />

      <a class="poster-hit" href="player.html?id=filme1" aria-label="Assistir Filme 1"
         style="left:29%; top:33.5%; width:12.4%; height:33.5%;"></a>

      <a class="poster-hit" href="player.html?id=filme2" aria-label="Assistir Filme 2"
         style="left:44%; top:33.5%; width:12.4%; height:33.5%;"></a>

      <a class="poster-hit" href="player.html?id=filme3" aria-label="Assistir Filme 3"
         style="left:58.5%; top:33.5%; width:12.4%; height:33.5%;"></a>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; <span id="year"></span> Cine Fer &mdash; todos os direitos reservados ao amor da minha vida.</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
